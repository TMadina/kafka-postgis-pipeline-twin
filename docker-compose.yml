services:
  # Наша база данных PostGIS
  db:
    image: postgis/postgis:15-3.3
    container_name: eco_postgis
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    restart: always

  # Брокер сообщений Kafka (исправленный)
  kafka:
    image: apache/kafka:latest
    container_name: pipeline_kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      # 🛠️ ИСПРАВЛЕНО: добавили CONTROLLER://:29093, чтобы Кафка могла запустить внутренний распределитель
      - KAFKA_LISTENERS=PLAINTEXT://:29092,CONTROLLER://:29093,EXTERNAL://:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:29092,EXTERNAL://localhost:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:29093
      - KAFKA_OFFERS_INTER_BROKER_LISTENER_NAME=PLAINTEXT